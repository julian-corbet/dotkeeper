name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # SARIF upload to Code Scanning
      security-events: write
      # OIDC for scorecard publish_results
      id-token: write
      # codeql-action/upload-sarif reads workflow-run metadata
      actions: read
      # Checkout the repo
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF results API so the
          # api.securityscorecards.dev badge / dashboard light up.
          publish_results: true

      # Upload SARIF to GitHub Code Scanning (free on public repos).
      # Results appear under the repo's Security tab.
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: results.sarif
