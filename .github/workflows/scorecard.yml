name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      # codeql-action/upload-sarif queries the workflow-run API for
      # context; without actions:read it fails "Resource not accessible".
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Default GITHUB_TOKEN lacks contents:read here because the job-
          # level permissions block narrows the workflow's read-all down to
          # security-events:write + id-token:write only. Use the PAT to
          # clone the private repo.
          token: ${{ secrets.SCORECARD_TOKEN }}
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Private repos need a PAT with read access for checks that query
          # org/admin APIs (branch protection, webhooks, etc.). SCORECARD_TOKEN
          # is a fine-grained PAT scoped to this repo, read-only.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # publish_results uploads to the OpenSSF public results API, which
          # rejects private repos. Disabled until the repo flips public.
          publish_results: false

      # Code Scanning (which consumes SARIF) requires GitHub Advanced Security,
      # which isn't available for personal private repos. Archive results as a
      # workflow artifact instead. When the repo goes public, swap this back
      # to github/codeql-action/upload-sarif for the Security tab view.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30
