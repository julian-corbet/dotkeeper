name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Default GITHUB_TOKEN lacks contents:read here because the job-
          # level permissions block narrows the workflow's read-all down to
          # security-events:write + id-token:write only. Use the PAT to
          # clone the private repo.
          token: ${{ secrets.SCORECARD_TOKEN }}
          persist-credentials: false

      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Private repos need a PAT with read access for checks that query
          # org/admin APIs (branch protection, webhooks, etc.). SCORECARD_TOKEN
          # is a fine-grained PAT scoped to this repo, read-only.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          # publish_results uploads to the OpenSSF public results API, which
          # rejects private repos. Disabled until the repo flips public.
          publish_results: false

      - uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: results.sarif
