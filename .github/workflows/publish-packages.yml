name: Publish Packages

# Manual trigger only. See NOTES below before running.
#
# Originally wired to `on: release: [published]`, but GitHub deliberately does
# not fire release events for releases created by GITHUB_TOKEN (the release.yml
# workflow uses GITHUB_TOKEN). So this never ran automatically, and after
# v0.1.2 we converted it to workflow_dispatch so the situation is explicit
# rather than silently broken.
#
# To run: `gh workflow run publish-packages.yml -f version=X.Y.Z` after a
# release is published and its assets are visible.
#
# PREREQUISITES before this can succeed:
# - A PAT with `repo` scope on julian-corbet's account, stored as secret
#   `PACKAGES_TOKEN`. GITHUB_TOKEN cannot write to the external repos
#   (julian-corbet/homebrew-dotkeeper, julian-corbet/scoop-dotkeeper).
# - AUR SSH key stored as `AUR_SSH_KEY` (this one is already wired).
# - The external tap/bucket/AUR repos exist and are writable by the PAT.
#
# UNTIL the above is set up, this workflow will fail at the `gh api ... PUT`
# steps for Homebrew/Scoop. AUR step self-skips if `AUR_SSH_KEY` is missing.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without the v prefix, e.g. 0.1.2)'
        required: true
        type: string

# Least privilege at workflow level; the one job below elevates only what it needs.
permissions: read-all

jobs:
  update-packages:
    runs-on: ubuntu-latest
    # Downloads release assets and pushes updates to external tap/bucket/AUR repos.
    # `contents: write` retained at job level for safety; the external repo updates
    # are done via separate auth (gh api / SSH key) and do not require this scope.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set version
        run: |
          VERSION="${{ inputs.version }}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=v${VERSION}" >> $GITHUB_ENV

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${TAG}" --pattern "checksums_sha256.txt" --dir /tmp
          cat /tmp/checksums_sha256.txt

      - name: Extract SHA256 hashes
        run: |
          get_sha() { grep "$1" /tmp/checksums_sha256.txt | awk '{print $1}'; }
          echo "SHA_LINUX_AMD64=$(get_sha linux_amd64.tar.gz)" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(get_sha linux_arm64.tar.gz)" >> $GITHUB_ENV
          echo "SHA_DARWIN_AMD64=$(get_sha darwin_amd64.tar.gz)" >> $GITHUB_ENV
          echo "SHA_DARWIN_ARM64=$(get_sha darwin_arm64.tar.gz)" >> $GITHUB_ENV
          echo "SHA_WINDOWS_AMD64=$(get_sha windows_amd64.zip)" >> $GITHUB_ENV
          echo "SHA_WINDOWS_ARM64=$(get_sha windows_arm64.zip)" >> $GITHUB_ENV

      # === Homebrew ===
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/dotkeeper.rb << 'FORMULA'
          class Dotkeeper < Formula
            desc "P2P repo sync with git history — embedded Syncthing + git auto-backup"
            homepage "https://dotkeeper.corbet.ch"
            license "AGPL-3.0-only"
            version "VERSION_PLACEHOLDER"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/julian-corbet/dotkeeper/releases/download/vVERSION_PLACEHOLDER/dotkeeper_VERSION_PLACEHOLDER_darwin_arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              else
                url "https://github.com/julian-corbet/dotkeeper/releases/download/vVERSION_PLACEHOLDER/dotkeeper_VERSION_PLACEHOLDER_darwin_amd64.tar.gz"
                sha256 "SHA_DARWIN_AMD64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/julian-corbet/dotkeeper/releases/download/vVERSION_PLACEHOLDER/dotkeeper_VERSION_PLACEHOLDER_linux_arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              else
                url "https://github.com/julian-corbet/dotkeeper/releases/download/vVERSION_PLACEHOLDER/dotkeeper_VERSION_PLACEHOLDER_linux_amd64.tar.gz"
                sha256 "SHA_LINUX_AMD64_PLACEHOLDER"
              end
            end

            depends_on "git"

            def install
              bin.install "dotkeeper"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dotkeeper version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" /tmp/dotkeeper.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" /tmp/dotkeeper.rb
          sed -i "s/SHA_DARWIN_AMD64_PLACEHOLDER/${SHA_DARWIN_AMD64}/g" /tmp/dotkeeper.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_LINUX_ARM64}/g" /tmp/dotkeeper.rb
          sed -i "s/SHA_LINUX_AMD64_PLACEHOLDER/${SHA_LINUX_AMD64}/g" /tmp/dotkeeper.rb

          # Push to homebrew-dotkeeper repo
          gh api repos/julian-corbet/homebrew-dotkeeper/contents/Formula/dotkeeper.rb \
            --method PUT \
            --field message="Update dotkeeper to ${VERSION}" \
            --field content="$(base64 -w0 /tmp/dotkeeper.rb)" \
            --field sha="$(gh api repos/julian-corbet/homebrew-dotkeeper/contents/Formula/dotkeeper.rb --jq .sha)" \
            2>/dev/null || \
          gh api repos/julian-corbet/homebrew-dotkeeper/contents/Formula/dotkeeper.rb \
            --method PUT \
            --field message="Update dotkeeper to ${VERSION}" \
            --field content="$(base64 -w0 /tmp/dotkeeper.rb)"

      # === Scoop ===
      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/dotkeeper.json << MANIFEST
          {
            "version": "${VERSION}",
            "description": "P2P repo sync with git history — embedded Syncthing + git auto-backup",
            "homepage": "https://dotkeeper.corbet.ch",
            "license": "AGPL-3.0-only",
            "architecture": {
              "64bit": {
                "url": "https://github.com/julian-corbet/dotkeeper/releases/download/v${VERSION}/dotkeeper_${VERSION}_windows_amd64.zip",
                "hash": "${SHA_WINDOWS_AMD64}"
              },
              "arm64": {
                "url": "https://github.com/julian-corbet/dotkeeper/releases/download/v${VERSION}/dotkeeper_${VERSION}_windows_arm64.zip",
                "hash": "${SHA_WINDOWS_ARM64}"
              }
            },
            "bin": "dotkeeper_${VERSION}_windows_amd64\\\\dotkeeper.exe",
            "depends": "git",
            "checkver": {
              "github": "https://github.com/julian-corbet/dotkeeper"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/julian-corbet/dotkeeper/releases/download/v\$version/dotkeeper_\$version_windows_amd64.zip"
                },
                "arm64": {
                  "url": "https://github.com/julian-corbet/dotkeeper/releases/download/v\$version/dotkeeper_\$version_windows_arm64.zip"
                }
              }
            }
          }
          MANIFEST

          gh api repos/julian-corbet/scoop-dotkeeper/contents/bucket/dotkeeper.json \
            --method PUT \
            --field message="Update dotkeeper to ${VERSION}" \
            --field content="$(base64 -w0 /tmp/dotkeeper.json)" \
            --field sha="$(gh api repos/julian-corbet/scoop-dotkeeper/contents/bucket/dotkeeper.json --jq .sha)" \
            2>/dev/null || \
          gh api repos/julian-corbet/scoop-dotkeeper/contents/bucket/dotkeeper.json \
            --method PUT \
            --field message="Update dotkeeper to ${VERSION}" \
            --field content="$(base64 -w0 /tmp/dotkeeper.json)"

      # === AUR ===
      - name: Update AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$AUR_SSH_KEY" ]; then
            echo "AUR_SSH_KEY not set, skipping AUR publish"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          git clone ssh://aur@aur.archlinux.org/dotkeeper-bin.git /tmp/aur-dotkeeper || \
            (mkdir -p /tmp/aur-dotkeeper && cd /tmp/aur-dotkeeper && git init && git remote add origin ssh://aur@aur.archlinux.org/dotkeeper-bin.git)

          cd /tmp/aur-dotkeeper

          cat > PKGBUILD << 'PKGEOF'
          # Maintainer: Julian Corbet <julian.corbet@gmail.com>
          pkgname=dotkeeper-bin
          pkgver=VERSION_PH
          pkgrel=1
          pkgdesc="P2P repo sync with git history — embedded Syncthing + git auto-backup"
          arch=('x86_64' 'aarch64')
          url="https://dotkeeper.corbet.ch"
          license=('AGPL-3.0-only')
          depends=('git')
          provides=('dotkeeper')
          conflicts=('dotkeeper')
          source_x86_64=("https://github.com/julian-corbet/dotkeeper/releases/download/v${pkgver}/dotkeeper_${pkgver}_linux_amd64.tar.gz")
          source_aarch64=("https://github.com/julian-corbet/dotkeeper/releases/download/v${pkgver}/dotkeeper_${pkgver}_linux_arm64.tar.gz")
          sha256sums_x86_64=('SHA_AMD64_PH')
          sha256sums_aarch64=('SHA_ARM64_PH')

          package() {
              local _arch
              [ "$CARCH" = "x86_64" ] && _arch="amd64" || _arch="arm64"
              cd "${srcdir}/dotkeeper_${pkgver}_linux_${_arch}"
              install -Dm755 dotkeeper "${pkgdir}/usr/bin/dotkeeper"
              install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
              install -Dm644 README.md "${pkgdir}/usr/share/doc/${pkgname}/README.md"
              install -Dm644 dotkeeper.toml.example "${pkgdir}/usr/share/doc/${pkgname}/dotkeeper.toml.example"
          }
          PKGEOF

          sed -i "s/VERSION_PH/${VERSION}/g" PKGBUILD
          sed -i "s/SHA_AMD64_PH/${SHA_LINUX_AMD64}/g" PKGBUILD
          sed -i "s/SHA_ARM64_PH/${SHA_LINUX_ARM64}/g" PKGBUILD

          # Generate .SRCINFO
          cat > .SRCINFO << SRCEOF
          pkgbase = dotkeeper-bin
          	pkgdesc = P2P repo sync with git history — embedded Syncthing + git auto-backup
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://dotkeeper.corbet.ch
          	arch = x86_64
          	arch = aarch64
          	license = AGPL-3.0-only
          	depends = git
          	provides = dotkeeper
          	conflicts = dotkeeper
          	source_x86_64 = https://github.com/julian-corbet/dotkeeper/releases/download/v${VERSION}/dotkeeper_${VERSION}_linux_amd64.tar.gz
          	sha256sums_x86_64 = ${SHA_LINUX_AMD64}
          	source_aarch64 = https://github.com/julian-corbet/dotkeeper/releases/download/v${VERSION}/dotkeeper_${VERSION}_linux_arm64.tar.gz
          	sha256sums_aarch64 = ${SHA_LINUX_ARM64}

          pkgname = dotkeeper-bin
          SRCEOF

          git config user.name "Julian Corbet"
          git config user.email "julian.corbet@gmail.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master || git push origin main
