name: Release

on:
  push:
    tags:
      - 'v*'

# Public repository: GITHUB_TOKEN doesn't need ANY scopes because all
# checkouts/reads work anonymously. Locking permissions to {} is the
# tightest available default. The `release` job runs without
# GITHUB_TOKEN entirely — it uses PACKAGES_TOKEN (a user PAT) so the
# release: published event downstream workflows depend on actually
# fires.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: linux_amd64
          - goos: linux
            goarch: arm64
            suffix: linux_arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux_armv7
          - goos: linux
            goarch: "386"
            suffix: linux_386
          - goos: linux
            goarch: riscv64
            suffix: linux_riscv64
          - goos: linux
            goarch: ppc64le
            suffix: linux_ppc64le
          - goos: linux
            goarch: s390x
            suffix: linux_s390x
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: darwin_amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin_arm64
          # Windows
          - goos: windows
            goarch: amd64
            suffix: windows_amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            suffix: windows_arm64
            ext: .exe
          - goos: windows
            goarch: "386"
            suffix: windows_386
            ext: .exe
          # BSDs
          - goos: freebsd
            goarch: amd64
            suffix: freebsd_amd64
          - goos: freebsd
            goarch: arm64
            suffix: freebsd_arm64
          - goos: openbsd
            goarch: amd64
            suffix: openbsd_amd64
          - goos: openbsd
            goarch: arm64
            suffix: openbsd_arm64
          # netbsd is intentionally dropped from v0.8.0 onward. The embedded
          # Syncthing v2 uses modernc.org/sqlite (pure-Go) for the database,
          # and modernc.org/libc has no netbsd port — every libc subpackage
          # excludes all .go files for GOOS=netbsd via build constraints.
          # See syncthing v2.0.0 release notes, which dropped netbsd builds
          # upstream for the same reason.

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Defense-in-depth: even with permissions: {} above, ask the
          # checkout action not to leave the (already-empty) token in
          # the local git config. Subsequent steps don't need to push
          # back.
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          COMMIT=${GITHUB_SHA::8}
          go build -tags noassets \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o dotkeeper${{ matrix.ext }} \
            ./cmd/dotkeeper

      - name: Archive
        run: |
          NAME=dotkeeper_${GITHUB_REF#refs/tags/v}_${{ matrix.suffix }}
          mkdir -p "${NAME}"
          cp dotkeeper${{ matrix.ext }} LICENSE README.md "${NAME}/"
          cp docs/examples/repo-config.toml "${NAME}/repo-config.toml"
          cp docs/examples/home-manager-denylist.nix "${NAME}/home-manager-denylist.nix"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" -r "${NAME}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.suffix }}
          # Explicit extensions — `dotkeeper_*.*` also matches the staging
          # directory (e.g. dotkeeper_0.1.1_linux_amd64) because its name
          # contains dots, which then surfaces as a directory in the release
          # job and breaks `sha256sum`.
          path: |
            dotkeeper_*.tar.gz
            dotkeeper_*.zip

  package:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
            suffix: linux_amd64
          - goarch: arm64
            nfpm_arch: arm64
            suffix: linux_arm64
          - goarch: arm
            nfpm_arch: armhf
            suffix: linux_armv7
          - goarch: "386"
            nfpm_arch: "386"
            suffix: linux_386
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Defense-in-depth: even with permissions: {} above, ask the
          # checkout action not to leave the (already-empty) token in
          # the local git config. Subsequent steps don't need to push
          # back.
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ matrix.suffix }}

      - name: Extract binary
        run: |
          tar xzf dotkeeper_*_${{ matrix.suffix }}.tar.gz
          cp dotkeeper_*_${{ matrix.suffix }}/dotkeeper .

      - name: Install nFPM
        env:
          # Pinned for reproducibility. Upstream renamed their assets from
          # nfpm_linux_amd64.tar.gz to nfpm_<ver>_Linux_x86_64.tar.gz at
          # some point, which is why the `latest` URL silently 404ed.
          NFPM_VERSION: "2.46.3"
        run: |
          URL="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          curl -sfL --retry 3 --retry-delay 5 --retry-all-errors -o nfpm.tar.gz "$URL"
          tar xzf nfpm.tar.gz nfpm
          chmod +x nfpm
          ./nfpm --version

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build deb
        run: ./nfpm pkg --config nfpm.yml --packager deb --target dotkeeper_${VERSION}_${{ matrix.nfpm_arch }}.deb
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - name: Build rpm
        run: ./nfpm pkg --config nfpm.yml --packager rpm --target dotkeeper_${VERSION}_${{ matrix.nfpm_arch }}.rpm
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - name: Build apk
        run: ./nfpm pkg --config nfpm.yml --packager apk --target dotkeeper_${VERSION}_${{ matrix.nfpm_arch }}.apk
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - name: Build archlinux
        run: ./nfpm pkg --config nfpm.yml --packager archlinux --target dotkeeper_${VERSION}_${{ matrix.nfpm_arch }}.pkg.tar.zst
        env:
          NFPM_ARCH: ${{ matrix.nfpm_arch }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ matrix.suffix }}
          path: |
            dotkeeper_*.deb
            dotkeeper_*.rpm
            dotkeeper_*.apk
            dotkeeper_*.pkg.tar.zst

  release:
    needs: [build, package]
    runs-on: ubuntu-latest
    # Creates the GitHub Release and uploads artifacts to it.
    #
    # Uses the PACKAGES_TOKEN PAT (same one homebrew.yml uses) instead
    # of GITHUB_TOKEN. The reason is event propagation: `gh release
    # create` invoked with the built-in GITHUB_TOKEN does not fire
    # `release: published` for downstream workflows.
    # https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
    # The Docker workflow listens on `release: published`, so with
    # GITHUB_TOKEN the v0.8.0 + v0.8.1 releases produced no Docker
    # image — each one had to be manually re-published via a user PAT
    # to kick docker.yml. PACKAGES_TOKEN is a classic PAT with only
    # `public_repo` scope; using it makes the release event
    # indistinguishable from a human-created one, so docker.yml runs
    # automatically.
    #
    # No `permissions:` block — PACKAGES_TOKEN is a user PAT and
    # doesn't read the workflow-permission scoping.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Defense-in-depth: even with permissions: {} above, ask the
          # checkout action not to leave the (already-empty) token in
          # the local git config. Subsequent steps don't need to push
          # back.
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum dotkeeper_* > checksums_sha256.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PACKAGES_TOKEN secret is not set. Add a classic PAT with 'public_repo' scope as the repository secret 'PACKAGES_TOKEN'."
            exit 1
          fi
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "${VERSION}" \
            --title "dotkeeper ${VERSION}" \
            --generate-notes \
            artifacts/dotkeeper_* \
            artifacts/checksums_sha256.txt
