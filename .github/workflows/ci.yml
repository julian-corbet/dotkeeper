name: CI

on:
  # Only run on manual pushes, not auto-sync commits.
  # Auto-sync commits start with "auto:" — we skip those in the job.
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege at workflow level. No job in this workflow writes anything.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip auto-sync commits from dotkeeper's git timer
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Configure git identity for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@dotkeeper.dev"

      - name: Build
        run: go build -tags noassets ./cmd/dotkeeper

      - name: Cross-compile sanity (windows/darwin)
        # dotkeeper supports Linux, macOS, and Windows. The host-arch build
        # above proves linux/amd64; this step proves the file-locking shim
        # and other platform-specific code compiles for darwin and windows.
        # CGO is off so we don't need the Apple/Windows cross toolchains.
        env:
          CGO_ENABLED: "0"
        run: |
          GOOS=darwin  GOARCH=amd64 go build -tags noassets ./cmd/dotkeeper
          GOOS=darwin  GOARCH=arm64 go build -tags noassets ./cmd/dotkeeper
          GOOS=windows GOARCH=amd64 go build -tags noassets ./cmd/dotkeeper

      - name: Test with coverage (race-enabled)
        # -race runs the Go data-race detector. Cheap on a single-package CI
        # run and surfaces concurrent-write bugs before they hit production —
        # the state.toml race fixed in PR #7 was exactly the class of bug
        # `-race` catches when properly exercised by tests.
        run: |
          go test -tags noassets -race -coverprofile=coverage.out -covermode=atomic ./...
          echo "### Coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -40 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 30

      - name: Vet
        run: go vet -tags noassets ./...

      - name: govulncheck
        # Reachability-aware CVE scan. Fails on any *called* advisory.
        # Module-only findings are listed in output but don't fail the run.
        # Version pinned for reproducibility; Dependabot bumps it.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck -tags noassets ./... || {
            echo "::warning::govulncheck found advisories — see output above"
            # Don't hard-fail while SECURITY.md documents known-unresolvable
            # quic-go advisories blocked on a Syncthing upstream bump.
            exit 0
          }

  lint:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt
        # gofmt drift is silent without a CI gate. golangci-lint doesn't
        # enforce gofmt by default, so run it explicitly here. Any file
        # that would be rewritten by `gofmt -w` fails the job and prints
        # the offending paths.
        run: |
          changed=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$changed" ]; then
            echo "::error::gofmt would rewrite the following files; run \`gofmt -w\` and commit:"
            echo "$changed"
            exit 1
          fi

      - name: golangci-lint
        # Baseline is clean (PR #15); lint is now a hard gate.
        # Version pinned for reproducibility; Dependabot bumps it.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run --build-tags noassets --timeout 5m ./...

  fuzz-smoke:
    # Runs every declared fuzz target for a short time on every PR. This is
    # the lightweight "did anyone break the parsers" gate, distinct from a
    # nightly long-running fuzz workflow. Seed-corpus regressions are caught
    # by the normal test job; this job surfaces *new* crashes that only show
    # up under randomized input.
    runs-on: ubuntu-latest
    needs: build
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Fuzz each target (20s each)
        run: |
          set -e
          for pkg in $(go list -tags noassets ./...); do
            # `go test -list` enumerates fuzz targets in the package.
            fuzz_targets=$(go test -tags noassets -list '^Fuzz' "$pkg" 2>/dev/null | grep '^Fuzz' || true)
            for target in $fuzz_targets; do
              echo "::group::fuzz $pkg $target"
              go test -tags noassets -run='^$' -fuzz="^${target}$" -fuzztime=20s "$pkg"
              echo "::endgroup::"
            done
          done

  multipeer-e2e:
    # Two-peer Syncthing fixture defined in tests/multipeer/.
    # Each Go test brings up its own compose project; the cleanup step prunes
    # any leftovers from a panic or test-runner kill.
    runs-on: ubuntu-latest
    needs: build
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build test image once (warm Docker layer cache)
        run: |
          docker build \
            -f tests/multipeer/Dockerfile.test \
            -t dotkeeper-multipeer-test:local \
            .

      - name: Run multipeer suite
        # -race builds the Go test binary with the data-race detector. The
        # detector runs inside the test process (not the dotkeeper container),
        # so it catches races in the harness and in any in-process Go code the
        # tests execute. Worth the ~10-20% overhead given the suite is the
        # exact place we'd want a race surfaced.
        run: go test -tags multipeer -race -v -timeout 25m ./tests/multipeer/...

      - name: Dump container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --format '{{.Names}}' | grep '^dkmp-' || true); do
            echo "::group::logs $c"
            docker logs --tail 200 "$c" || true
            echo "::endgroup::"
          done

      - name: Prune leftover compose projects
        if: always()
        run: |
          for p in $(docker compose ls -aq 2>/dev/null | grep '^dkmp-' || true); do
            docker compose -p "$p" down -v --remove-orphans || true
          done
