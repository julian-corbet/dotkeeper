name: CI

on:
  # Only run on manual pushes, not auto-sync commits.
  # Auto-sync commits start with "auto:" — we skip those in the job.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip auto-sync commits from dotkeeper's git timer
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure git identity for tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@dotkeeper.dev"

      - name: Build
        run: go build -tags noassets ./cmd/dotkeeper

      - name: Test
        run: go test -tags noassets ./...

      - name: Vet
        run: go vet -tags noassets ./...

