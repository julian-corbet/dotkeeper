name: Docker

on:
  release:
    types: [published]
  # Build on pushes to main as a Dockerfile smoke test (no push to registry).
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  # Manual trigger — used to backfill a missed release event (e.g. when the
  # release was created by another workflow's GITHUB_TOKEN, which cannot
  # propagate `release: published` to downstream workflows). Pass the tag
  # (vX.Y.Z) you want to build + push.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to check out (tag or branch). Empty = default branch.'
        required: false
        default: ''

# Least privilege at workflow level.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # release / workflow_dispatch: build AND push to GHCR.
    # push-to-main: build only (smoke-test the Dockerfile without bumping
    # :latest off every commit — :latest tracks the most recent release,
    # not the most recent code change).
    permissions:
      contents: read
      packages: write
    # Skip auto-sync commits
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'push'
        # PACKAGES_TOKEN is a classic PAT owned by julian-corbet with
        # write:packages scope. Needed instead of GITHUB_TOKEN because the
        # default workflow token cannot CREATE a new package under a user
        # namespace — it can only push to packages already linked to the
        # repo. This is the first publish of ghcr.io/julian-corbet/dotkeeper
        # so the PAT is required. Same secret homebrew.yml uses.
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: julian-corbet
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/julian-corbet/dotkeeper
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}

      - name: Set build args
        run: |
          REF="${{ github.event.inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            echo "VERSION=${REF#refs/tags/v}" >> $GITHUB_ENV
          elif [[ "$REF" == v* ]]; then
            echo "VERSION=${REF#v}" >> $GITHUB_ENV
          else
            echo "VERSION=dev" >> $GITHUB_ENV
          fi
          echo "COMMIT=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
