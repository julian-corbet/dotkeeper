name: Docker

on:
  release:
    types: [published]
  # Build on pushes to main as a Dockerfile smoke test (no push to registry).
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  # Manual trigger — emergency rebuild path. Normal releases propagate
  # automatically via `release: published` now that release.yml uses
  # PACKAGES_TOKEN. Pass the tag (vX.Y.Z) you want to build + push.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to check out (tag or branch). Empty = default branch.'
        required: false
        default: ''

# Least privilege at workflow level.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # release / workflow_dispatch: build AND push to GHCR.
    # push-to-main: build only (smoke-test the Dockerfile without bumping
    # :latest off every commit — :latest tracks the most recent release,
    # not the most recent code change).
    permissions:
      contents: read
      packages: write
    # Skip auto-sync commits
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'push'
        # PACKAGES_TOKEN is a classic PAT owned by julian-corbet with
        # write:packages scope. Needed instead of GITHUB_TOKEN because the
        # default workflow token cannot CREATE a new package under a user
        # namespace — it can only push to packages already linked to the
        # repo. This is the first publish of ghcr.io/julian-corbet/dotkeeper
        # so the PAT is required. Same secret homebrew.yml uses.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: julian-corbet
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Resolve version from ref
        id: version
        # Normalises the ref (release tag, workflow_dispatch input, or
        # plain push) into VERSION + MAJOR_MINOR outputs we feed into
        # the Docker tags below. Done as a separate step (instead of
        # letting metadata-action's type=semver compute the tags) so
        # the workflow_dispatch path also produces proper version tags
        # — type=semver only inspects github.ref, which stays at
        # refs/heads/main on a manual dispatch even if `inputs.ref` is
        # a tag, so the semver patterns previously emitted nothing.
        run: |
          REF="${{ github.event.inputs.ref || github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          elif [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            VERSION=""
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ -n "$VERSION" ]]; then
            echo "major_minor=${VERSION%.*}" >> $GITHUB_OUTPUT
          fi
          # Build-args still need a VERSION even for the dev path.
          echo "VERSION=${VERSION:-dev}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/julian-corbet/dotkeeper
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.version != '' }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.major_minor != '' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
