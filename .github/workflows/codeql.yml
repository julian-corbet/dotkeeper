name: CodeQL

# Static security analysis for Go. Findings appear under the repo's
# Security tab alongside Scorecard's SARIF. Free on public repos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan; keeps findings fresh even without code changes.
    - cron: '30 5 * * 1'

permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Skip auto-sync commits from dotkeeper's git timer
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    permissions:
      # Upload SARIF to Code Scanning
      security-events: write
      # Read workflow-run metadata for telemetry
      actions: read
      # Checkout
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          languages: ${{ matrix.language }}
          # Manual build so we can supply the required -tags noassets.
          build-mode: manual
          queries: security-extended

      - name: Build
        run: go build -tags noassets ./cmd/dotkeeper

      - name: Analyze
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          category: "/language:${{ matrix.language }}"
