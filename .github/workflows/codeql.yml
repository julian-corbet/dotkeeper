name: CodeQL

# Static security analysis for Go. Findings appear under the repo's
# Security tab alongside Scorecard's SARIF. Free on public repos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan; keeps findings fresh even without code changes.
    - cron: '30 5 * * 1'

permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Skip auto-sync commits from dotkeeper's git timer
    if: "!startsWith(github.event.head_commit.message, 'auto:')"
    permissions:
      # Upload SARIF to Code Scanning
      security-events: write
      # Read workflow-run metadata for telemetry
      actions: read
      # Checkout
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v3
        with:
          languages: ${{ matrix.language }}
          # Manual build so we can supply the required -tags noassets.
          build-mode: manual
          queries: security-extended

      - name: Build
        run: go build -tags noassets ./cmd/dotkeeper

      - name: Analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v3
        with:
          category: "/language:${{ matrix.language }}"
